# Fleet Incident Reporter — report.heliontracking.com
# Replaces the old report-portal on port 3002.
# Include inside your nginx http { } block (SSL certs must exist).

server {
    listen 443 ssl;
    server_name report.heliontracking.com;

    ssl_certificate     C:/nginx/nginx-1.30.0/ssl/heliontracking.com-chain.pem;
    ssl_certificate_key C:/nginx/nginx-1.30.0/ssl/heliontracking.com-key.pem;

    client_max_body_size 50m;
    proxy_read_timeout 600s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 600s;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name report.heliontracking.com;

    location /.well-known/acme-challenge/ {
        root C:/win-acme/webroot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
